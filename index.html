<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/QFkm044C1.mp4","M4L4M S3P1 M3MBV4T J4R4K J4D1 H1L4NG"],
  ["https://cdn2.videy.co/8T0meRU31.mp4","D14M K4M4R T3RTVTVP SV45N4 J4D1 B3RVB4H"],
  ["https://cdn2.videy.co/MLNrmnCv1.mp4","P4ND4NG4N L4M4 Y4NG S4L1NG M3NG3RT1"],
  ["https://cdn2.videy.co/RcU2QKCv1.mp4","K3D3K4T4N H4LVS T4NP4 B4NY4K K4T4"],
  ["https://cdn2.videy.co/5Wed9jP71.mp4","S3NYVM K3C1L B1K1N P1K1R4N K4CVV"],
  ["https://cdn2.videy.co/t6vC1PC91.mp4","M4L4M P4NJ4NG D3NG4N T3N51 H3N1NG"],
  ["https://cdn2.videy.co/Pks56iSP1.mp4","D14M D14M R454 1TV MVL41 T3R454"],
  ["https://cdn2.videy.co/234756101.mp4","SV45N4 H4N94T D1 B4L1K P1NT0"],
  ["https://cdn2.videy.co/AwuI2ZNV1.mp4","K3P1NCVT T1B4 T1B4 J4D1 N4Y4T4"],
  ["https://cdn2.videy.co/WVGgjrOc1.mp4","S4L1NG P4ND4NG T4NP4 VJ4R4N"],
  ["https://cdn2.videy.co/yvIa61Cm1.mp4","M4L4M 1NV T3R454 L3B1H B3R4RT1"],
  ["https://cdn2.videy.co/Ma97T85s1.mp4","R454 4N3H Y4NG T4K D1VNGK4P"],
  ["https://cdn2.videy.co/OjbbA9Uk1.mp4","K3D3K4T4N Y4NG T4K D1R3NC4N4"],
  ["https://cdn2.videy.co/HQvTWWGl1.mp4","D14M K3H3N1NG4N 4D4 M0M3N K3C1L"],
  ["https://cdn2.videy.co/FxX6Vs0R1.mp4","M4L4M B3RVJ0NG J4D1 K3N4NG4N"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
